<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Timer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #0a0a0a; /* Deep black background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white; /* Base text color is white */
        }

        /* UI Layer to organize elements above the canvas */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Spaces out top, middle, bottom */
            align-items: center;
            padding: 30px 0;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none; /* Lets clicks pass through to canvas if needed */
        }

        /* Top Instruction Banner */
        #instruction-message {
            color: white; /* Clean white text on dark card */
            padding: 5em 3em;
            font-size: 1.85vw;
            text-align: center;
        }

        /* Middle Timer Section */
        #timer-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column; /* Stack label and timer */
        }

        /* Inner container to hold label and number in a tidy block */
        #timer-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #timer-label {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Clean font like image */
            font-size: 2vw; /* Standard size label */
            color: white; /* Standard white text */
            margin-bottom: 10px; /* Space above number */
        }

        #timer {
            font-family: 'Courier New', Courier, monospace; /* Classic font */
            font-size: 15vw; /* Much larger number, like image */
            font-weight: 900;
            transition: color 1s linear; /* Keep transition */
            color: white; /* Initial white color, will transition to yellow/red */
            
            /* Old black outline and shadow are removed for a clean look like image */
            -webkit-text-stroke: 0;
            text-shadow: none;
        }

        /* Bottom Control Panel */
        #controls {
            pointer-events: auto; /* Re-enable clicks for controls */
            background: rgba(0, 0, 0, 0.9); /* Dark semi-transparent card */
            color: white; /* Clean white text on dark card */
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.05); /* Subtle light shadow */
            border: 1px solid #333; /* Dark border */
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
        }
        
        #controls button {
            cursor: pointer;
            padding: 8px 16px;
            background: #222; /* Darker button on dark card */
            color: white; /* Standard white text */
            border: 1px solid #555; /* Darker border */
            border-radius: 20px;
            font-weight: bold;
            transition: 0.2s;
            font-size: 14px;
        }

        #controls button:hover {
            background: #444; /* Hover state for button */
        }

        #controls input[type="range"] {
            cursor: pointer;
            width: 250px;
            accent-color: #e63946; /* Red styling for slider */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        
        <div id="instruction-message">
            Please write your <strong>Name & Student ID</strong> on each <strong>answered</strong> sheet.
        </div>

        <div id="timer-container">
            <div id="timer-inner">
                <div id="timer-label">Time Left:</div>
                <div id="timer">50:00</div>
            </div>
        </div>

        <div id="controls">
            <button id="playPauseBtn">⏸ Pause</button>
            <label for="timeSlider">Time:</label>
            <input type="range" id="timeSlider" min="0" value="3000">
        </div>

    </div>
    
    <canvas id="scene"></canvas>

    <script>
        // --- TIMER SETUP ---
        const START_MINUTES = 50;
        const FIRE_START_MINUTES = 35;
        let totalSeconds = START_MINUTES * 60;
        let currentSeconds = totalSeconds;
        let isPlaying = true;
        
        let timerElement = document.getElementById('timer');
        let timeSlider = document.getElementById('timeSlider');
        let playPauseBtn = document.getElementById('playPauseBtn');

        // Configure Slider
        timeSlider.max = totalSeconds;
        timeSlider.value = currentSeconds;

        timeSlider.addEventListener('input', (e) => {
            currentSeconds = parseInt(e.target.value);
            updateDisplay();
        });

        playPauseBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? "⏸ Pause" : "▶ Play";
        });

        // --- ICON SETUP ---
        const iconImg = new Image();
        iconImg.src = 'firefighter.png'; // Make sure this matches your local file

        // --- CANVAS SETUP ---
        const canvas = document.getElementById('scene');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- PARTICLE ENGINES ---
        let particles = [];
        let fireZones = [];
        let firefighters = [];

        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; 
                
                if (this.type === 'fire') {
                    this.size = Math.random() * 20 + 10;
                    this.vx = Math.random() * 2 - 1;
                    this.vy = Math.random() * -3 - 1;
                    this.life = 1.0;
                    this.decay = Math.random() * 0.02 + 0.015;
                } else if (this.type === 'water') {
                    this.size = Math.random() * 4 + 2;
                    this.vx = 0;
                    this.vy = 0;
                    this.life = 1.0;
                    this.decay = Math.random() * 0.03 + 0.02;
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                if (this.type === 'fire') {
                    this.size *= 0.95; 
                } else {
                    this.vy += 0.2; // Gravity for water
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0, this.size), 0, Math.PI * 2);
                if (this.type === 'fire') {
                    let r = 255;
                    let g = Math.floor(this.life * 255);
                    let b = 0;
                    let a = this.life;
                    // Adjusted smoke to be much lighter for visibility on the black background
                    if (this.life < 0.3) { r = g = b = 150; } 
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${a})`;
                } else {
                    ctx.fillStyle = `rgba(100, 200, 255, ${this.life})`;
                }
                ctx.fill();
            }
        }

        // --- FIREFIGHTER ICON ---
        class Firefighter {
            constructor() {
                this.isRightSide = Math.random() > 0.5;
                this.x = this.isRightSide ? width + 50 : -50;
                this.y = height / 2 + (Math.random() * 300 - 150); 
                
                this.target = null;
                this.state = 'entering';
                this.speed = 2;
                this.sprayTimer = 0;
                this.iconSize = 50; 
            }

            findTarget() {
                let validZones = fireZones.filter(z => z.health > 0);
                if (validZones.length > 0) {
                    this.target = validZones[Math.floor(Math.random() * validZones.length)];
                } else {
                    this.state = 'exiting';
                }
            }

            update() {
                if (this.target && this.target.health <= 0) {
                    this.target = null;
                    this.state = 'exiting';
                }

                if (this.state === 'entering') {
                    if (!this.target) this.findTarget();
                    
                    if (this.target) {
                        let dx = this.target.x - this.x;
                        let dy = this.target.y - this.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist > 150) {
                            this.x += (dx / dist) * this.speed;
                            this.y += (dy / dist) * this.speed;
                        } else {
                            this.state = 'spraying';
                            this.sprayTimer = 180; 
                        }
                    } else {
                        this.state = 'exiting';
                    }
                } 
                else if (this.state === 'spraying') {
                    this.sprayTimer--;
                    
                    if (this.sprayTimer % 2 === 0 && this.target) {
                        let p = new Particle(this.x, this.y - 10, 'water');
                        let dx = this.target.x - this.x;
                        let dy = this.target.y - this.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        p.vx = (dx / dist) * 8 + (Math.random() - 0.5) * 2;
                        p.vy = (dy / dist) * 8 - 4; 
                        particles.push(p);
                    }

                    if (this.sprayTimer <= 0) {
                        this.state = 'exiting';
                    }
                } 
                else if (this.state === 'exiting') {
                    let targetEdge = this.x > width / 2 ? width + 50 : -50;
                    if (Math.abs(this.x - targetEdge) > 5) {
                        this.x += this.x > width / 2 ? this.speed : -this.speed;
                    } else {
                        this.dead = true; 
                    }
                }
            }

            draw() {
                if (!iconImg.complete) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                
                let facingRight = true;
                if (this.state === 'entering' && this.target && this.target.x < this.x) facingRight = false;
                if (this.state === 'exiting' && this.x < width/2) facingRight = false;
                if (this.state === 'spraying' && this.target && this.target.x < this.x) facingRight = false;
                
                if (!facingRight) ctx.scale(-1, 1);

                ctx.drawImage(
                    iconImg, 
                    -this.iconSize / 2, 
                    -this.iconSize / 2, 
                    this.iconSize, 
                    this.iconSize
                );

                ctx.restore();
            }
        }

        // --- GAME LOOP ---
        function updateDisplay() {
            let m = Math.floor(currentSeconds / 60);
            let s = currentSeconds % 60;
            // JavaScript now only updates the timer number element
            timerElement.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

            let colorRatio = currentSeconds / totalSeconds;
            let greenValue = Math.floor(colorRatio * 255);
            // Color transition is still applied to the timer number
            timerElement.style.color = `rgb(255, ${greenValue}, 0)`;
        }

        function spawnFireZone() {
            let angle = Math.random() * Math.PI * 2;
            let radius = 150 + Math.random() * (width / 3);
            fireZones.push({
                x: width / 2 + Math.cos(angle) * radius,
                y: height / 2 + Math.sin(angle) * radius,
                health: 200 
            });
        }

        function gameLoop() {
            ctx.clearRect(0, 0, width, height);

            if (currentSeconds <= FIRE_START_MINUTES * 60) {
                let firePhaseRatio = 1 - (currentSeconds / (FIRE_START_MINUTES * 60));
                let targetFireZones = Math.floor(firePhaseRatio * 15) + 1; 
                let targetFirefighters = Math.floor(firePhaseRatio * 5) + 1; 

                if (fireZones.length > targetFireZones) {
                    fireZones.length = targetFireZones;
                }

                while (fireZones.length < targetFireZones) {
                    spawnFireZone();
                }

                fireZones.forEach(zone => {
                    if (zone.health > 0) {
                        let intensity = Math.max(1, Math.floor(zone.health / 100));
                        for (let k = 0; k < intensity; k++) {
                            particles.push(new Particle(zone.x + (Math.random()*40-20), zone.y + (Math.random()*20-10), 'fire'));
                        }
                    }
                });

                let activeFighters = firefighters.filter(f => !f.dead).length;
                if (activeFighters < targetFirefighters && Math.random() < 0.02) {
                    firefighters.push(new Firefighter());
                }
            } else {
                fireZones = [];
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();

                if (p.type === 'water') {
                    for (let j = 0; j < fireZones.length; j++) {
                        let zone = fireZones[j];
                        let dx = p.x - zone.x;
                        let dy = p.y - zone.y;
                        
                        if (dx*dx + dy*dy < 2500) { 
                            zone.health -= 1.5; 
                            p.life = 0; 
                            break; 
                        }
                    }
                }

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            for (let i = fireZones.length - 1; i >= 0; i--) {
                if (fireZones[i].health <= 0) {
                    fireZones.splice(i, 1);
                }
            }

            for (let i = firefighters.length - 1; i >= 0; i--) {
                let f = firefighters[i];
                f.update();
                f.draw();
                if (f.dead) {
                    firefighters.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // --- CLOCK TICK ---
        function tick() {
            if (isPlaying && currentSeconds > 0) {
                currentSeconds--;
                timeSlider.value = currentSeconds; 
                updateDisplay();
            }
        }

        // Init
        updateDisplay();
        setInterval(tick, 1000);
        gameLoop();

    </script>
</body>
</html>
