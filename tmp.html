<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yvette Arroway Radar Chart</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #e0e0e0;
            font-family: Arial, sans-serif;
        }
        .paper-container {
            background-color: #f7f6f2; /* Off-white paper color */
            padding: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        svg {
            display: block;
            /* Prevent text selection while dragging */
            user-select: none; 
        }
        .title {
            font-size: 22px;
            fill: #222;
        }
        .axis-label {
            font-size: 13px;
            fill: #333;
        }
        .grid-number {
            font-size: 11px;
            fill: #222;
        }
        .radar-polygon {
            fill: rgba(184, 198, 214, 0.7);
            stroke: #25609a;
            stroke-width: 2;
            stroke-linejoin: round;
        }
        .grid-circle-inner {
            fill: none;
            stroke: #a0a0a0;
            stroke-width: 0.7;
            stroke-dasharray: 2, 3;
        }
        .grid-circle-outer {
            fill: none;
            stroke: #5c4332; /* Brownish outer border */
            stroke-width: 1;
        }
        /* New styles for the interactive handles */
        .axis-line {
            stroke: #a0a0a0;
            stroke-width: 0.5;
            stroke-dasharray: 2, 2;
        }
        .handle {
            fill: #25609a;
            stroke: #f7f6f2;
            stroke-width: 2;
            cursor: grab;
            transition: fill 0.2s;
        }
        .handle:hover {
            fill: #1a436b;
            r: 7;
        }
        .handle:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

<div class="paper-container">
    <svg id="radar-svg" width="600" height="500" viewBox="0 0 600 500">
        
        <text x="300" y="50" class="title" text-anchor="middle">Hunter Pentagram</text>

        <circle cx="300" cy="280" r="32" class="grid-circle-inner" />
        <circle cx="300" cy="280" r="64" class="grid-circle-inner" />
        <circle cx="300" cy="280" r="96" class="grid-circle-inner" />
        <circle cx="300" cy="280" r="128" class="grid-circle-inner" />
        <circle cx="300" cy="280" r="160" class="grid-circle-outer" />

        <text x="319" y="254" class="grid-number">20</text>
        <text x="338" y="228" class="grid-number">40</text>
        <text x="356" y="202" class="grid-number">60</text>
        <text x="375" y="176" class="grid-number">80</text>
        <text x="394" y="150" class="grid-number">100</text>

        <g id="axis-lines"></g>

        <polygon id="radar-polygon" points="" class="radar-polygon" />

        <g id="handles-group"></g>

        <text x="300" y="105" class="axis-label" text-anchor="middle">Hunter1</text>
        <text x="475" y="245" class="axis-label" text-anchor="start">Hunter2</text>
        <text x="405" y="420" class="axis-label" text-anchor="middle">Hunter3</text>
        <text x="180" y="420" class="axis-label" text-anchor="middle">Hunter4</text>
        <text x="120" y="245" class="axis-label" text-anchor="end">Hunter5</text>

    </svg>
</div>

<script>
    const svg = document.getElementById('radar-svg');
    const polygon = document.getElementById('radar-polygon');
    const handlesGroup = document.getElementById('handles-group');
    const axisLinesGroup = document.getElementById('axis-lines');

    // Chart Configuration
    const center = { x: 300, y: 280 };
    const maxRadius = 160;
    const stepInterval = 32; // Distance between each circle (160 / 5)
    
    // Angles for the 5 axes (in radians)
    const angles = [
        -Math.PI / 2,                     // Top
        -Math.PI / 2 + (2 * Math.PI / 5), // Top Right
        -Math.PI / 2 + (4 * Math.PI / 5), // Bottom Right
        -Math.PI / 2 + (6 * Math.PI / 5), // Bottom Left
        -Math.PI / 2 + (8 * Math.PI / 5)  // Top Left
    ];

    // Initial radiuses based on your original coordinates
    let values = [160, 128, 144, 128, 112]; 
    let handles = [];
    let activeHandleIndex = null;

    // Draw Axis lines and Create Handles
    values.forEach((val, i) => {
        // Draw axis line
        let lineX = center.x + maxRadius * Math.cos(angles[i]);
        let lineY = center.y + maxRadius * Math.sin(angles[i]);
        let line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', center.x);
        line.setAttribute('y1', center.y);
        line.setAttribute('x2', lineX);
        line.setAttribute('y2', lineY);
        line.setAttribute('class', 'axis-line');
        axisLinesGroup.appendChild(line);

        // Create Handle
        let handle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        handle.setAttribute('r', 5.5);
        handle.setAttribute('class', 'handle');
        
        // Start Dragging
        handle.addEventListener('pointerdown', (e) => {
            activeHandleIndex = i;
            handle.setPointerCapture(e.pointerId);
        });
        
        handlesGroup.appendChild(handle);
        handles.push(handle);
    });

    // Function to calculate and update visual positions
    function updateChart() {
        let points = values.map((val, i) => {
            let x = center.x + val * Math.cos(angles[i]);
            let y = center.y + val * Math.sin(angles[i]);
            
            // Update handle positions
            handles[i].setAttribute('cx', x);
            handles[i].setAttribute('cy', y);
            
            return `${x.toFixed(1)},${y.toFixed(1)}`;
        });
        
        // Update Polygon points
        polygon.setAttribute('points', points.join(' '));
    }

    // Handle Dragging
    svg.addEventListener('pointermove', (e) => {
        if (activeHandleIndex === null) return;

        // Get precise mouse position relative to the SVG
        let pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        let svgP = pt.matrixTransform(svg.getScreenCTM().inverse());

        // Calculate distance from center
        let dx = svgP.x - center.x;
        let dy = svgP.y - center.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        // Snap distance to the nearest concentric circle
        let snappedDist = Math.round(dist / stepInterval) * stepInterval;
        
        // Constrain so it doesn't go outside the radar or into negative numbers
        if (snappedDist < 0) snappedDist = 0;
        if (snappedDist > maxRadius) snappedDist = maxRadius;

        values[activeHandleIndex] = snappedDist;
        updateChart();
    });

    // Stop Dragging
    svg.addEventListener('pointerup', () => {
        activeHandleIndex = null;
    });

    // Run initial setup
    updateChart();
</script>

</body>
</html>
